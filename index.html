      { name: 'Morningstar Direct', desc: '基金、ETF績效與評級', url: 'https://www.morningstar.com/business/products/direct' },
    ]
  },
  {
    id: 'realestate', icon: '🏢', title: '房地產 & 基礎設施',
    free: [
      { name: 'US Census Housing Starts', desc: '美國新屋開工、建築許可', url: 'https://www.census.gov/construction/nrc' },
      { name: 'OECD Housing Data', desc: '各國房價、租金負擔指標', url: 'https://www.oecd.org/en/data/indicators/housing-prices.html' },
      { name: '內政部不動產資訊平台', desc: '台灣不動產交易實價登錄', url: 'https://pip.moi.gov.tw' },
    ],
    paid: [
      { name: 'CoStar / Altus', desc: '商辦、零售、工業不動產數據', url: 'https://www.costar.com' },
      { name: 'MSCI Real Estate (IPD)', desc: '機構不動產投資績效指數', url: 'https://www.msci.com/our-solutions/real-assets' },
    ]
  },
  {
    id: 'strategy', icon: '📊', title: '跨產業策略 & 智庫研究',
    free: [
      { name: 'McKinsey Global Institute', desc: 'MGI全部報告免費下載', url: 'https://www.mckinsey.com/mgi/our-research' },
      { name: 'McKinsey Quarterly', desc: '管理洞察、領導力、組織變革', url: 'https://www.mckinsey.com/quarterly/overview' },
      { name: 'BCG Henderson Institute', desc: '策略與競爭研究（免費公開）', url: 'https://www.bcg.com/bcg-henderson-institute' },
      { name: 'Bain Insights', desc: '行業洞察報告（免費公開）', url: 'https://www.bain.com/insights' },
      { name: 'HBR Analytic Services (部分免費)', desc: '企業策略、管理學術研究', url: 'https://hbr.org/hbr-analytic-services' },
    ],
    paid: [
      { name: 'MarketsandMarkets', desc: '新興市場規模與預測報告', url: 'https://www.marketsandmarkets.com' },
      { name: 'Frost & Sullivan', desc: '工業、醫療、科技市場研究', url: 'https://www.frost.com' },
    ]
  },
];

let currentFilter = 'all';
const openSectors = new Set();

function setFilter(f) {
  currentFilter = f;
  ['all','free','paid'].forEach(x => {
    const el = document.getElementById('pill-' + x);
    el.className = 'pill' + (x === f ? ` active-${x}` : '');
  });
  render();
}

function toggleSector(id) {
  if (openSectors.has(id)) openSectors.delete(id);
  else openSectors.add(id);
  render();
}

function sourceHTML(s) {
  return `<div class="source-row">
    <div class="source-name">${s.name}</div>
    <div class="source-desc">${s.desc}</div>
    <a class="source-link" href="${s.url}" target="_blank" rel="noopener">前往 ↗</a>
  </div>`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const container = document.getElementById('sectors-list');
  let html = '';
  let anyVisible = false;

  DATA.forEach(sector => {
    let freeSrc = sector.free.filter(s => !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q));
    let paidSrc = sector.paid.filter(s => !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q));
    if (currentFilter === 'paid') freeSrc = [];
    if (currentFilter === 'free') paidSrc = [];
    if (!freeSrc.length && !paidSrc.length) return;
    anyVisible = true;

    const isOpen = openSectors.has(sector.id) || !!q;
    const badges = [
      freeSrc.length ? `<span class="badge badge-free">免費 ${freeSrc.length}</span>` : '',
      paidSrc.length ? `<span class="badge badge-paid">付費 ${paidSrc.length}</span>` : '',
    ].join('');

    html += `<div class="sector">
      <div class="sector-header" onclick="toggleSector('${sector.id}')">
        <div class="sector-icon">${sector.icon}</div>
        <div class="sector-title">${sector.title}</div>
        <div class="sector-badges">${badges}</div>
        <svg class="chevron${isOpen ? ' open' : ''}" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="sector-body${isOpen ? ' open' : ''}">`;

    if (freeSrc.length) {
      html += `<div class="tier-section">
        <div class="tier-heading tier-heading-free">免費公開 <div class="tier-line tier-line-free"></div></div>
        <div class="source-list">${freeSrc.map(sourceHTML).join('')}</div>
      </div>`;
    }
    if (paidSrc.length) {
      html += `<div class="tier-section">
        <div class="tier-heading tier-heading-paid">付費訂閱 <div class="tier-line tier-line-paid"></div></div>
        <div class="source-list">${paidSrc.map(sourceHTML).join('')}</div>
      </div>`;
    }

    html += `</div></div>`;
  });

  if (!anyVisible) {
    html = `<div class="no-results">找不到符合「${document.getElementById('search').value}」的資料來源</div>`;
  }

  container.innerHTML = html;
}

render();
</script>
</body>
</html>
